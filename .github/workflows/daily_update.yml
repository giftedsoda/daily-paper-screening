name: Daily Paper Fetch

on:
  schedule:
    # Run daily at UTC 00:00 (08:00 Beijing time)
    - cron: "0 0 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new papers from arxiv
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_papers.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/papers.json
          if git diff --cached --quiet; then
            echo "No new papers found, nothing to commit."
          else
            git commit -m "auto: update papers.json $(date -u +%Y-%m-%d)"
            git push
          fi
